name: Build
on:
  push:
    branches:
      - master
      - refactor
    paths-ignore:
      - 'assets/**'
permissions:
  contents: read
  packages: write
jobs:
  test:
    uses: ./.github/workflows/test.yaml
  build:
    needs:
      - test
    uses: clambin/workflows/.github/workflows/build.yaml@main
    with:
      image: ghcr.io/clambin/mediamon